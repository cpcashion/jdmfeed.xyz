name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Force Pages source to GitHub Actions (not branch)
        run: |
          echo "Current Pages config:"
          gh api "repos/${{ github.repository }}/pages" --jq '{build_type, source, cname}' || true
          gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow \
            && echo "Pages build_type set to workflow" \
            || echo "WARNING: could not update Pages config — set Source to 'GitHub Actions' in Settings → Pages"
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
