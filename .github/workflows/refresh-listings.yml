name: Refresh live listings

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-listings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch live listings from sources (Bring a Trailer, eBay Motors, …)
        run: node scripts/fetch-listings.mjs
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
      - name: Publish updated listings to source and site root
        run: |
          # Also copy to the repo root so the branch-mode Pages publisher
          # serves it immediately (same pattern as the built site).
          cp app/public/listings.json listings.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A app/public/listings.json listings.json
          if git diff --cached --quiet; then
            echo "No listing changes this run."
          else
            git commit -m "Refresh live listings [skip ci]"
            # main can move while this job runs (site deploys race it) —
            # rebase our data commit on top and retry the push.
            for i in 1 2 3; do
              git push && break
              git fetch origin main
              git rebase origin/main
            done
            gh api -X POST "repos/${{ github.repository }}/pages/builds" || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Trigger site rebuild
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
