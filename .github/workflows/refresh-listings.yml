name: Refresh live listings

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-listings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch live listings via Claude web search
        run: node scripts/fetch-listings.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit updated listings
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/listings.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No listing changes this run."
          else
            git commit -m "Refresh live listings"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
